name: Deploy FE to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "course-platform/client/**"
      - ".github/workflows/deploy-fe-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepare static artifact
        run: |
          rm -rf dist
          mkdir -p dist/src
          cp -r course-platform/client/public/. dist/
          cp -r course-platform/client/src/. dist/src/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
